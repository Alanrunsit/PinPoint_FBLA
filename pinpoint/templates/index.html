{% extends "base.html" %}
{% block title %}Explore{% endblock %}

{% block content %}
<section class="hero">
    <div class="hero-content">
        <h1>Discover Local.</h1>
        <p>Explore what your community has in store. Read reviews, grab deals, and support your community.</p>
    </div>
</section>

<section class="controls-bar">
    <div class="filter-pills" id="category-filters">
        <button class="pill active" data-category="all">All</button>
        <button class="pill" data-category="food">Food</button>
        <button class="pill" data-category="retail">Retail</button>
        <button class="pill" data-category="services">Services</button>
        <button class="pill" data-category="entertainment">Entertainment</button>
        <button class="pill" data-category="health">Health</button>
    </div>
    <div class="sort-control">
        <label for="sort-select">Sort by</label>
        <select id="sort-select">
            <option value="newest">Newest</option>
            <option value="rating">Highest Rated</option>
            <option value="reviews">Most Reviewed</option>
        </select>
    </div>
</section>

<section class="business-grid" id="business-grid">
    <div class="loading-spinner" id="grid-loader">Loading businesses&hellip;</div>
</section>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => PinPoint.initExplorePage());
</script>
{% endblock %}
